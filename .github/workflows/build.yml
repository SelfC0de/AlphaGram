name: Build AlphaGram APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & tools
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;21.4.7075529" \
            "cmake;3.10.2.4988404" \
            "build-tools;34.0.0" \
            "platforms;android-34"

      - name: Decode Keystore
        if: github.event.inputs.build_type == 'release'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > TMessagesProj/config/release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "release" ]; then
            ./gradlew :TMessagesProj_AppStandalone:assembleRelease \
              -PSIGNING_KEY_STORE_PASSWORD="${{ secrets.SIGNING_KEY_STORE_PASSWORD }}" \
              -PSIGNING_KEY_ALIAS="${{ secrets.SIGNING_KEY_ALIAS }}" \
              -PSIGNING_KEY_PASSWORD="${{ secrets.SIGNING_KEY_PASSWORD }}" \
              -PAPP_ID="${{ secrets.TELEGRAM_APP_ID }}" \
              -PAPP_HASH="${{ secrets.TELEGRAM_APP_HASH }}" \
              --no-daemon \
              --stacktrace
          else
            ./gradlew :TMessagesProj_AppStandalone:assembleDebug \
              -PAPP_ID="${{ secrets.TELEGRAM_APP_ID }}" \
              -PAPP_HASH="${{ secrets.TELEGRAM_APP_HASH }}" \
              --no-daemon \
              --stacktrace
          fi

      - name: Get version
        id: version
        run: |
          VERSION=$(grep "versionName" TMessagesProj_AppStandalone/build.gradle | \
            sed 's/.*versionName "\(.*\)".*/\1/' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Collect APK
        run: |
          mkdir -p artifacts
          if [ "${{ github.event.inputs.build_type }}" == "release" ]; then
            cp TMessagesProj_AppStandalone/build/outputs/apk/release/*.apk \
              artifacts/AlphaGram-${{ steps.version.outputs.version }}-release.apk
          else
            cp TMessagesProj_AppStandalone/build/outputs/apk/debug/*.apk \
              artifacts/AlphaGram-${{ steps.version.outputs.version }}-debug.apk
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlphaGram-${{ github.event.inputs.build_type }}-${{ steps.version.outputs.version }}
          path: artifacts/*.apk
          retention-days: 14

      - name: Create GitHub Release
        if: github.event.inputs.build_type == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: AlphaGram v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: artifacts/*.apk
          body: |
            ## AlphaGram v${{ steps.version.outputs.version }}
            Скачай APK ниже и установи поверх предыдущей версии — данные сохранятся.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup build artifacts
        if: always()
        run: |
          rm -rf TMessagesProj/build
          rm -rf TMessagesProj_AppStandalone/build
          rm -rf TMessagesProj/config/release.keystore
          rm -rf ~/.gradle/caches/build-cache-*
          rm -rf artifacts
